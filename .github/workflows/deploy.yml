name: 🚀 Deploy IChingNow

on:
  push:
    branches:
      - main   # Tự động deploy khi push lên branch main

jobs:
  deploy:
    name: Build & Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔨 Build
        run: npm run build

      - name: 🗑️ Xóa file cũ & Upload lên hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          port: 21
          # FTP account: jkokiwsihosting_admin
          # FTP root = /home/jkokiwsihosting/public_html → chỉ cần ./kinhdich/
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # ⚠️ Hosting BẮT BUỘC dùng TLS (FTPS) — không nhận kết nối cleartext
          protocol: ftps
          # Cho phép cert self-signed (hosting thường dùng)
          allow-self-signed: true
          # Bắt buộc TLS ngay khi kết nối (chống downgrade attack)
          explicit-utf8: true
          local-dir: ./dist/
          server-dir: ./kinhdich/
          # Xóa toàn bộ file cũ trên server trước khi upload
          dangerous-clean-slate: true
          # Bỏ qua các file không cần thiết
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
